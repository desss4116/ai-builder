<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI Builder</title>

  <style>
    body{
      margin:0;
      background:#0f1117;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    .box{
      text-align:center;
    }

    h1{
      font-size:60px;
      margin:0;
    }

    p{
      opacity:.7;
      margin-top:10px;
    }

    .glow{
      color:#00ffcc;
      text-shadow:
        0 0 10px #00ffcc,
        0 0 20px #00ffcc,
        0 0 40px #00ffcc;
    }
  </style>
</head>
<body>

<div class="box">
  <h1 class="glow">AI Builder</h1>

  <p>
    Autonomous Website Intelligence System
  </p>
</div>

</body>
</html>
