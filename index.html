<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Builder Ultimate</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
}

.card{
background:#0f172a;
border:1px solid #1e293b;
}

</style>

</head>

<body class="p-10">

<h1 class="text-6xl font-black mb-6">
AI Builder Ultimate
</h1>

<p class="text-slate-400 text-2xl mb-10">
Maze Runner Cinematic Generator
</p>

<textarea
id="prompt"
class="w-full h-40 bg-slate-900 rounded-3xl p-6 mb-6"
placeholder="Сделай сайт по Бегущему в лабиринте..."
></textarea>

<button
onclick="generateSite()"
class="bg-blue-500 px-8 py-4 rounded-2xl text-2xl"
>
Generate
</button>

<div
id="output"
class="mt-10"
></div>

<script>

function generateSite(){

const prompt =
document.getElementById("prompt").value

document.getElementById("output").innerHTML = `

<section class="card p-10 rounded-3xl">

<h2 class="text-5xl font-bold mb-6">
THE MAZE RUNNER
</h2>

<p class="text-slate-400 text-xl mb-10">
AI Generated Cinematic Experience
</p>

<div class="grid md:grid-cols-3 gap-6">

<div class="bg-slate-900 p-6 rounded-3xl">

<h3 class="text-3xl mb-4">
3D Maze
</h3>

<p class="text-slate-400">
Interactive Three.js maze system
</p>

</div>

<div class="bg-slate-900 p-6 rounded-3xl">

<h3 class="text-3xl mb-4">
Characters
</h3>

<p class="text-slate-400">
Movie lore & survival profiles
</p>

</div>

<div class="bg-slate-900 p-6 rounded-3xl">

<h3 class="text-3xl mb-4">
Dashboard
</h3>

<p class="text-slate-400">
Realtime mission interface
</p>

</div>

</div>

<div class="mt-10 bg-black border border-slate-700 h-[400px] rounded-3xl flex items-center justify-center">

<p class="text-slate-500 text-3xl">
Three.js Cinematic Scene
</p>

</div>

<div class="mt-10">

<h3 class="text-4xl mb-4">
AI Analysis
</h3>

<p class="text-slate-400">
Prompt:
${prompt}
</p>

</div>

</section>

`

}

</script>

</body>

</html>
