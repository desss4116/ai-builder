<!DOCTYPE html>
<body style="margin:0; display:flex; height:100vh; background:#020617; color:white; font-family:sans-serif;">
    <div style="width:320px; padding:30px; border-right:1px solid #ffffff10; display:flex; flex-direction:column; gap:20px;">
        <h2 style="margin:0; letter-spacing:-1px;">AI Editor</h2>
        <button style="width:100%; padding:15px; border-radius:12px; border:none; background:#3b82f6; color:white; font-weight:bold; cursor:pointer;">Publish Update</button>
        <button style="width:100%; padding:15px; border-radius:12px; border:1px solid #ffffff20; background:transparent; color:white; cursor:pointer;">Export Code</button>
    </div>
    <iframe id="preview" style="flex:1; border:none; background:white;"></iframe>
    <script>
        const id = window.location.pathname.split('/').filter(Boolean).pop();
        document.getElementById('preview').src = '/site/' + id;
    </script>
</body>
